<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>UMW Volleyball Practice Planner</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <header>
      <div class="header-left">
        <span class="header-title">UMW Volleyball</span>
        <span class="header-sub">Practice Planner</span>
      </div>
      <div class="header-right">
        <label for="practiceDate">Date</label>
        <input type="date" id="practiceDate">
      </div>
    </header>

    <div class="layout">

      <aside id="drillLibrary">
        <div class="libraryLabel">Drill Library</div>
        <ul id="drillList"></ul>
      </aside>

      <section id="practicePlan">
        <div class="planHeader">
          <h2>Practice Plan</h2>
          <div class="progWrap">
            <progress id="time" max="90" value="0"></progress>
            <span id="timeLeft">90 min left</span>
          </div>
          <div class="planButtons">
            <button id="resetPlan" type="button">Clear</button>
            <button id="savePlan" type="button">Save</button>
          </div>
        </div>
        <ul id="planList"></ul>
      </section>

    </div>

    <div id="drillModal" class="modal">
      <div class="modal-content">
        <span id="closeModal" class="close">&times;</span>
        <h3>Set Drill Duration</h3>
        <input type="range" id="durationSlider" min="5" max="90" step="5">
        <span id="sliderValue">min</span>
        <br><br>
        <button id="confirmAdd">Add Drill</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
